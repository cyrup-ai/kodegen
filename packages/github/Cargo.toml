[package]
name        = "kodgen_github"
version     = "0.1.0"
edition     = "2024"
authors     = ["David Maple <david@kodegen.ai>"]
description = "Github tools in Pure Rust via Octocrab"
license = "Apache-2.0 OR MIT"

[dependencies]
kodegen_tool = { path = "../tool" }
kodegen_utils = { path = "../utils" }
schemars = "1.0"
rmcp = { git = "https://github.com/modelcontextprotocol/rust-sdk.git", branch = "main", features = ["client", "schemars", "server", "transport-child-process", "transport-io", "transport-sse-client", "transport-sse-client-reqwest", "transport-streamable-http-client", "transport-streamable-http-client-reqwest"], version = "0.8.1" }


octocrab    = "0.47.0"
thiserror   = "2.0.17"
anyhow      = "1.0"
chrono      = "0.4"
log         = "0.4"
tokio       = { version = "1.48", features = ["rt", "rt-multi-thread", "macros", "sync", "fs"] }
tokio-stream = "0.1"
futures     = "0.3"
serde       = { version = "1.0", features = ["derive"] }
serde_json  = "1.0"
serde_yaml  = "0.9"
toml        = "0.9"
walkdir     = "2.5"
lazy_static = "1.5"
regex       = "1.12"
reqwest     = { version = "0.12", features = ["json"] }
semver      = "1.0"
lru         = "0.16"
tempfile    = "3.23"
jsonwebtoken = "9.3"
gix = { version = "0.73", features = ["worktree-mutation", "blocking-network-client"] }

[dev-dependencies]
tempfile    = "3.23"

[features]
default = ["mcp"]
mcp = []  # Feature flag for MCP tools

[lib]
name = "kodgen_github"
path = "src/lib.rs"
