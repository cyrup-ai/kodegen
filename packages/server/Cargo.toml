[package]
name = "kodegen"
version = "0.1.0"
edition = "2024"
description = "KODEGEN.ᴀɪ: Memory-efficient, Blazing-Fast, MCP tools for code generation agents."
license = "Apache-2.0 OR MIT"
authors = ["KODEGEN.ᴀɪ"]
homepage = "https://kodegen.ai"
repository = "https://github.com/cyrup-ai/kodegen"
readme = "../../README.md"
categories = ["development-tools", "command-line-utilities", "api-bindings"]
keywords = [
    "mcp",
    "terminal",
    "agent",
    "filesystem",
    "claude"
]

[dependencies]
termcolor = { git = "https://github.com/cyrup-ai/termcolor", branch="main" }

# Tool packages - OPTIONAL (only compiled when features are enabled)
kodegen_filesystem = { path = "../filesystem", optional = true }
kodegen_terminal = { path = "../terminal", optional = true }
kodegen_process = { path = "../process", optional = true }
kodegen_introspection = { path = "../introspection", optional = true }
kodegen_prompt = { path = "../prompt", optional = true }
kodegen_sequential_thinking = { path = "../sequential-thinking", optional = true }
kodegen_claude_agent = { path = "../claude-agent", optional = true }
kodegen_citescrape = { path = "../citescrape", optional = true }
kodgen_git = { path = "../git", optional = true }
kodgen_github = { path = "../github", optional = true }

# Core packages - REQUIRED (always compiled)
kodegen_config = { path = "../config" }
kodegen_tool = { path = "../tool" }
kodegen_utils = { path = "../utils" }
kodegen_autoconfig = { path = "../autoconfig" }

# CLI argument parsing
clap = { version = "4.5", features = ["derive", "env"] }

# MCP SDK
rmcp = { git = "https://github.com/modelcontextprotocol/rust-sdk.git", branch = "main", features = ["client", "schemars", "server", "transport-child-process", "transport-io", "transport-sse-client", "transport-sse-client-reqwest", "transport-sse-server", "transport-streamable-http-client", "transport-streamable-http-client-reqwest"], version = "0.8.1" }

# HTTP server for SSE transport
axum = { version = "0.7", optional = true, default-features = false, features = ["http1", "tokio"] }

# Async runtime
tokio = { version = "1.48", features = ["full"] }
tokio-util = "0.7"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Schema generation
schemars = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# Logging
log = "0.4"
env_logger = "0.11"

# Process management
sysinfo = "0.37"

# String manipulation and search
regex = "1.12"
grep = "0.4"           # Ripgrep library for fast line-oriented regex searching
ignore = "0.4.24"      # Directory walking with .gitignore support

# Cross-platform compatibility
dirs = "6.0"

# Template engine and frontmatter parsing
minijinja = "2.12"
gray_matter = "0.3"

# HTTP for potential future features
reqwest = { version = "0.12", features = ["json"] }

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# Async utilities
futures = "0.3"

# Base64 encoding/decoding
base64 = "0.22.1"

mime_guess = "2.0.5"
once_cell = "1.21.3"
parking_lot = "0.12.5"

[features]
default = ["all"]

# Meta-feature: enable everything
all = [
    "filesystem",
    "terminal",
    "process",
    "introspection",
    "prompt",
    "sequential_thinking",
    "claude_agent",
    "citescrape",
    "git",
    "github",
    "config"
]

# Individual tool categories (feature names EXACTLY match package names)
filesystem = ["dep:kodegen_filesystem"]
terminal = ["dep:kodegen_terminal"]
process = ["dep:kodegen_process"]
introspection = ["dep:kodegen_introspection"]
prompt = ["dep:kodegen_prompt"]
sequential_thinking = ["dep:kodegen_sequential_thinking"]
claude_agent = ["dep:kodegen_claude_agent"]
citescrape = ["dep:kodegen_citescrape"]
git = ["dep:kodgen_git"]
github = ["dep:kodgen_github"]
config = []  # Config tools (ConfigManager is always required by other tools)  

# Convenience feature sets
minimal = ["filesystem", "terminal"]
standard = ["filesystem", "terminal", "process", "prompt"]
advanced = ["all"]

[dev-dependencies]



[[bin]]
name = "kodegen"
path = "src/main.rs"
