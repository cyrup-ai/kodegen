[package]
name = "kodegen_config"
version = "0.1.0"
edition = "2024"
description = "KODEGEN.ᴀɪ: Memory-efficient, Blazing-Fast, MCP tools for code generation agents."
authors = ["KODEGEN.ᴀɪ"]
homepage = "https://kodegen.ai"
repository = "https://github.com/cyrup-ai/kodegen"
readme = "../../README.md"
categories = ["development-tools", "command-line-utilities", "api-bindings"]
keywords = [
    "mcp",
    "terminal",
    "agent",
    "filesystem",
    "claude"
]
license = "Apache-2.0 OR MIT"

[dependencies]
kodegen_tool = { path = "../tool" }
kodegen_utils = { path = "../utils" }

# MCP SDK
rmcp = { git = "https://github.com/modelcontextprotocol/rust-sdk.git", branch = "main", features = ["client", "schemars", "server", "transport-child-process", "transport-io", "transport-sse-client", "transport-sse-client-reqwest", "transport-streamable-http-client", "transport-streamable-http-client-reqwest"], version = "0.8.1" }

# Async runtime
tokio = { version = "1.48", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Schema generation
schemars = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# Logging
log = "0.4"

# Process management
sysinfo = "0.37"

# String manipulation and search
regex = "1.12"
grep = "0.4"           # Ripgrep library for fast line-oriented regex searching
ignore = "0.4.24"      # Directory walking with .gitignore support

# Cross-platform compatibility
dirs = "6.0"

# Template engine and frontmatter parsing
minijinja = "2.12"
gray_matter = "0.3"

# HTTP for potential future features
reqwest = { version = "0.12", features = ["json"] }

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# Async utilities
futures = "0.3"

# Base64 encoding/decoding
base64 = "0.22.1"

mime_guess = "2.0.5"
once_cell = "1.21.3"
parking_lot = "0.12.5"

[lib]
name = "kodegen_config"
path = "src/lib.rs"
