[package]
name = "kodegen_mcp_client"
version = "0.1.0"
edition = "2024"
description = "MCP client for kodegen server integration testing"
license = "Apache-2.0 OR MIT"

[dependencies]
# MCP SDK with client features
rmcp = { git = "https://github.com/modelcontextprotocol/rust-sdk.git", branch = "main", features = ["client", "transport-child-process"] }

# Async runtime
tokio = { version = "1.48", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# Logging (for examples)
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Process management (for cleanup on error in examples)
sysinfo = "0.37"

[dev-dependencies]
tempfile = "3.0"  # For filesystem test fixtures
