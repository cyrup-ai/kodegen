[package]
name = "kodegen_sign"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "kodegen_sign"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.9"
dirs = "6.0"
shellexpand = "3.1"
rcgen = "0.14"
reqwest = { version = "0.12", features = ["json", "blocking"] }
jsonwebtoken = "9.3"
base64 = "0.22"
thiserror = "2.0"
