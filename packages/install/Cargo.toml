[package]
name = "kodegen_install"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "kodegen-install"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
toml = "0.9"
dirs = "6.0"
which = "8"
cc = "1.2"
tempfile = "3.23"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "sync", "macros", "fs"] }
cfg-if = "1.0"
thiserror = "2.0"
log = "0.4"
env_logger = "0.11"
chrono = "0.4"
termcolor = "1.4"
rcgen = "0.14"
base64 = "0.22"
pem = "3.0"
x509-parser = "0.17"
time = "0.3"
kodegen_daemon = { path = "../daemon" }
tokio-stream = { version = "0.1", features = ["sync"] }
once_cell = "1.20"
futures = "0.3"
arrayvec = "0.7"
atomic-counter = "1.0"

[target.'cfg(target_os = "macos")'.dependencies]
plist = "1.8"

[target.'cfg(target_os = "linux")'.dependencies]
nix = { version = "0.30", features = ["user"] }
